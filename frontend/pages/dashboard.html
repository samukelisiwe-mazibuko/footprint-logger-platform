<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Dashboard</h1>

    <div class="card">
      <h2>Total Emissions</h2>
      <p id="totalEmission">0</p>
    </div>

    <div class="card">
      <h2>Total Activities</h2>
      <p id="activityCount">0</p>
    </div>

    <div class="card">
      <h2>Add Activity</h2>

      <form id="activityForm">
        <input type="text" id="activity" placeholder="Activity Name" required />

        <select id="category" required>
          <option value="">Select Category</option>
          <option value="Transport">Transport</option>
          <option value="Food">Food</option>
          <option value="Energy">Energy</option>
          <option value="Waste">Waste</option>
        </select>

        <input type="number" id="co2Value" placeholder="CO2 Value" required />

        <button type="submit">Add Activity</button>
      </form>
    </div>

    <a href="insights.html">View Insights</a>
  </div>

  <script src="../js/dashboard.js"></script>
  <script src="../js/activities.js"></script>

  <script>
    document
      .getElementById("activityForm")
      .addEventListener("submit", function (e) {
        e.preventDefault();

        const activityData = {
          activity: document.getElementById("activity").value,
          category: document.getElementById("category").value,
          co2Value: document.getElementById("co2Value").value,
          date: new Date(),
        };

        addActivity(activityData);
      });
  </script>
</body>
</html>
